name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check syntax
        run: |
          cd backend
          python -m py_compile app/main.py
          python -m py_compile app/config.py
      - name: Check frontend
        run: |
          cd frontend
          npm ci
          npx tsc --noEmit || true
